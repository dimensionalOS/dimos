# Railway service config for apps/server.
# Set the service's "Config-as-code Path" to apps/server/railway.toml.
# Build context must be the repo root so workspace:* deps resolve.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/server/Dockerfile"
# No watchPatterns: every push to master rebuilds this service. (Watch-path
# matching under a monorepo Root Directory is ambiguous; for this sample we
# favor "always deploy" over selective rebuilds.)

[deploy]
startCommand = "bun run src/server.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
