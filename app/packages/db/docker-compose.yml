name: robomoo

services:
  postgres:
    image: postgres:17
    container_name: robomoo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: robomoo
    ports:
      - "54325:5432"
    volumes:
      - robomoo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d robomoo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Local S3-compatible object storage, standing in for the Railway bucket.
  minio:
    image: minio/minio:latest
    container_name: robomoo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - robomoo_minio_data:/data
    restart: unless-stopped

  # Create the `robomoo` bucket on startup so the server can write immediately.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/robomoo;
      exit 0;
      "

volumes:
  robomoo_postgres_data:
  robomoo_minio_data:
