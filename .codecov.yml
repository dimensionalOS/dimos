codecov:
  branch: main
  notify:
    manual_trigger: true

coverage:
  status:
    project:
      default:
        # Project coverage includes indirect and carried-forward coverage. Allow
        # small global drift while keeping patch coverage strict below.
        threshold: 1%
    patch: true

# Carry forward self-hosted, as these are not run on external PRs.
flag_management:
  individual_flags:
    - name: SelfHosted-Linux
      carryforward: true
    - name: SelfHosted-macos
      carryforward: true
    - name: SelfHosted-Large
      carryforward: true

comment:
  layout: "newheader, diff, flags, components, files"
  require_head: false
  require_base: false
