# Real-robot trajectory generation and smoothing profile for `m20-simple-nav`.
#
# Run with:
#   dimos --transport=zenoh --zenoh-connect tcp/<aos_ip>:7447 \
#     run m20-simple-nav
#
# The m20-simple-nav blueprint loads this profile automatically. Values are
# validated against ReplanningAStarPlannerConfig at startup.
# Restart DimOS after editing this file. This first profile intentionally covers
# only the A* objective and final-path diagnostics/smoothing introduced by the
# M20 Simple Nav planning upgrades.

replanningastarplanner:
  # A* objective = geometric path length + normalized costmap cell cost.
  # Increasing this value favors shorter routes more strongly. Must be >= 0.
  path_length_weight: 1.0

  # Weight for normalized costmap values in the A* objective. Increasing this
  # value favors lower-cost clearance corridors even when they are longer.
  # Must be >= 0.
  path_cell_cost_weight: 3.0

  # Publish the raw grid-cell A* path on /raw_path for Rerun comparison.
  # This does not change the controller path. This profile enables the stream so
  # operators can compare raw and final paths during physical M20 validation.
  publish_raw_path: true

  # Minimum active-path distance checked for occupied cells, in metres.
  # The initial 3 m value preserves the target branch's existing behavior.
  obstacle_lookahead_min_distance_m: 3.0

  # Command-speed preview horizon, in seconds. Keep 0 to preserve a fixed 3 m
  # lookahead; use 3.0 only after the dynamic preview is validated on M20.
  obstacle_lookahead_time_s: 0.0

  # Maximum active-path lookahead, in metres. It must be greater than or equal
  # to the minimum. Keep 3 m while dynamic preview remains disabled.
  obstacle_lookahead_max_distance_m: 3.0

  # Select costmap-aware constrained smoothing. This profile enables validation,
  # fractional backtracking, and safe fallback to the raw-resampled A* path.
  constrained_path_smoothing_enabled: true

  # Collect and print one structured timing record for every smoothed path.
  # Keep false during normal operation; enable only for latency debugging.
  path_smoothing_performance_logging_enabled: false

  # Maximum constrained-smoothing iterations. More iterations may improve
  # convergence but increase planning latency. Must be an integer >= 0.
  path_smoothing_iterations: 40

  # Attraction to each original A* point, range [0.0, 1.0]. Larger values keep
  # more grid geometry; smaller values let neighboring-point smoothing dominate.
  path_smoothing_data_weight: 0.02

  # Neighbor/Laplacian smoothing strength, range [0.0, 0.5]. A value of 0
  # disables the neighbor update; the upper bound prevents unstable oscillation.
  path_smoothing_smoothness_weight: 0.45

  # Hard maximum displacement of each adjusted point from its corresponding
  # raw A* point, in metres. A value of 0 disables geometric adjustment.
  path_smoothing_max_deviation_m: 0.10

  # Distance between costmap validation samples along candidate path segments,
  # in metres. Smaller values detect thinner obstacles but use more CPU. Must be > 0.
  path_smoothing_collision_sample_spacing_m: 0.05

  # Maximum permitted increase in mean costmap cost over the aligned raw path.
  # Lethal and out-of-map cells are always rejected. Must be >= 0.
  path_smoothing_max_cost_increase: 2.0

  # Fraction retained after each failed full-path validation, range (0.0, 1.0).
  # With 0.5, candidates retain 100%, 50%, 25%, then 12.5% of smoothing.
  path_smoothing_backtracking_factor: 0.5

  # Number of reduced-fraction retries after the full smoothing candidate.
  # Three retries with factor 0.5 evaluate 1.0, 0.5, 0.25, and 0.125.
  path_smoothing_max_backtracking_steps: 3

  # Approximate spacing between final controller waypoints, in metres.
  # Smaller values preserve curves but increase message and controller work.
  path_resample_spacing_m: 0.10

obstacleavoidance:
  # Master switch for the autonomous-navigation stop filter. False preserves
  # existing M20 behavior by passing planner commands through unchanged.
  # Keep disabled until costmap cadence and physical braking are measured.
  enabled: false

  # Minimum forward occupied-cell detection boundary from the robot centre, in
  # metres. This provisional value comes from MuJoCo and is not M20-calibrated.
  stop_distance_m: 1.20

  # Clear boundary required before a stopped robot can resume, in metres. Must
  # be greater than stop_distance_m to provide spatial hysteresis.
  resume_distance_m: 1.40

  # Estimated sensing-to-command reaction time, in seconds. Replace this
  # provisional value with the measured physical M20 end-to-end latency.
  reaction_time_s: 0.50

  # Deceleration used in v^2/(2a), in metres per second squared. Replace this
  # provisional value with measured M20 emergency braking performance.
  braking_deceleration_m_s2: 0.60

  # Additional stopping-distance allowance after latency, braking, and robot
  # footprint, in metres. Must be non-negative.
  stop_safety_margin_m: 0.20

  # Extra safety margin added to the forward width and rotation radius, in
  # metres. Must be non-negative.
  lateral_margin_m: 0.10

  # Number of clear costmaps with distinct timestamps required before
  # releasing a blocked autonomous command. Must be at least 1.
  clear_costmap_count: 2

  # Maximum accepted costmap age, in seconds. A nonzero autonomous command is
  # replaced with zero after this timeout. The current global-map cadence must
  # be increased or replaced by a local costmap before enabling this module.
  costmap_timeout_s: 1.50

  # Maximum accepted odometry age, in seconds. A nonzero autonomous command is
  # replaced with zero after this timeout.
  odometry_timeout_s: 0.50
