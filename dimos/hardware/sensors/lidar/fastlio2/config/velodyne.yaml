common:
    lid_topic:  "/velodyne_points"
    imu_topic:  "/imu/data"
    time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
    time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                  # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

preprocess:
    lidar_type: 2                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR,
    # Each RSAIRY lidar has 96 scan lines. In rsdriver merged mode
    # (send_separately=false) front+rear clouds share the same ring
    # index space 0..95 (each ring value holds one point from each
    # Airy), NOT 0..191 as the older comments claimed — verified via
    # SHM probe after Finding #29. Bridge forwards rings raw (no more
    # `ring * 64 / 192` remap). Safe at 96 per FASTLIO2_LOG Finding
    # #25 audit: N_SCANS is a runtime int used only in
    # `feature_enabled` paths, which are unreachable because
    # laserMapping.hpp hardcodes feature_enabled=false. The ring value
    # is read from points but never indexed into a fixed-size array.
    scan_line: 96
    scan_rate: 10                # only need to be set for velodyne, unit: Hz,
    # drdds bridge emits time as float32 relative SECONDS (0.0 → max scan span).
    # timestamp_unit: 0=second, 1=ms, 2=us, 3=ns.
    timestamp_unit: 0
    # Spherical blind radius around the LIDAR OPTICAL CENTER (sensor frame).
    # Reduced from 1.0 → 0.1m now that robot-body self-features are handled
    # by the body-frame AABB crop in drdds_lidar_bridge (FASTLIO2_LOG Finding
    # #34). Low blind preserves real near-field features (doorway jambs,
    # walls, obstacles within 0.5m) which are critical for narrow-passage
    # navigation. RSAIRY's own hardware blind filters the noisy sub-10cm
    # range at the sensor level. Upstream FAST-LIO default is 0.01m.
    blind: 0.1

mapping:
    # acc_cov bumped 0.1 → 0.5 (5×) per codex second opinion (FASTLIO2_LOG
    # Finding #31): stationary accel σ is 0.01 but rotation accel σ is ~1
    # m/s² on M20 Pro wheel-legged platform (leg-shuffle noise). Default
    # 0.1 over-trusts accel during rotation → filter commits to IMU
    # predictions carrying real physical noise + residual fictitious-accel
    # error → ICP sometimes locks to wrong local minimum → runaway.
    # Bumping cov lets scan-match dominate during rotation.
    acc_cov: 0.5
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree:    180
    det_range:     100.0
    # When using M20's Airy integrated IMU path:
    #   airy_imu_bridge already rotates accel + gyro into base_link, and the
    #   drdds-merged lidar cloud is published in base_link as well. Extrinsic
    #   is therefore identity — DO NOT let FAST-LIO2 also estimate it. The
    #   DIFOP C.17 factory calibration already resolves the IMU→lidar
    #   rotation once at startup. Leaving `extrinsic_est_en: true` under
    #   rapid yaw destabilizes the filter (the estimator drifts the
    #   extrinsic as it tries to reconcile IMU predictions with the
    #   scan match, and pose explodes). See FASTLIO2_LOG Finding #24.
    # When using the yesense IMU path (legacy), the extrinsic is unknown and
    # we have no better value than the Velodyne default. The old value
    # `extrinsic_T: [0, 0, 0.28]` caused 20–30 m stationary drift per 15 s
    # (FASTLIO2_LOG Finding #17). Switching to the Airy IMU path is the fix.
    extrinsic_est_en:  false
    extrinsic_T: [ 0, 0, 0]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1]

publish:
    path_en:  false
    scan_publish_en:  true       # false: close all the point cloud output
    dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

pcd_save:
    pcd_save_en: true
    interval: -1                 # how many LiDAR frames saved in each pcd file;
                                 # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.
