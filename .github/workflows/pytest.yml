name: testing

on:
 workflow_call:
   inputs:
     imagetag:
       required: true
       type: string
       default: "latest"

permissions:
  contents: read
  packages: read

jobs:
  run-tests:
    runs-on: dimos-runner-ubuntu-2204

    container:
      image: ghcr.io/dimensionalos/dev:${{ inputs.imagetag }}

    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          /entrypoint.sh bash -c "pytest"
