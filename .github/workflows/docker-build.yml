name: Docker

on:
  push:
    branches: [ dockerworkflow ]
    paths:
      - 'docker/**'
      - 'dimos/**'
      - '.github/workflows/docker-build.yml'
      - 'scripts/generate_docker_matrix.py'
  # pull_request:
  #   branches: [ main ]
  #   paths:
  #     - 'docker/**'
  #     - 'dimos/**'
  #     - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push images to registry'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate build matrix
        id: set-matrix
        run: |
          MATRIX_OUTPUT=$(python scripts/generate_docker_matrix.py)
          echo "matrix=$MATRIX_OUTPUT" >> $GITHUB_OUTPUT

  # Level 0 images (no dependencies)
  build-images-0:
    name: Build ${{ matrix.name }}
    needs: [generate-matrix]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) | where(level, 0) }}
      fail-fast: false
    <<: *build-steps

  # Level 1 images (depend on level 0)
  build-images-1:
    name: Build ${{ matrix.name }}
    needs: [generate-matrix, build-images-0]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) | where(level, 1) }}
      fail-fast: false
    <<: *build-steps
      
  # Level 2 images (depend on level 1)
  build-images-2:
    name: Build ${{ matrix.name }}
    needs: [generate-matrix, build-images-1]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) | where(level, 2) }}
      fail-fast: false
    <<: *build-steps
      
  # Level 3 images (depend on level 2)
  build-images-3:
    name: Build ${{ matrix.name }}
    needs: [generate-matrix, build-images-2]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) | where(level, 3) }}
      fail-fast: false
    <<: *build-steps
      
  # Level 4 images (depend on level 3)
  build-images-4:
    name: Build ${{ matrix.name }}
    needs: [generate-matrix, build-images-3]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) | where(level, 4) }}
      fail-fast: false
    <<: *build-steps

# Reusable job steps for all matrix jobs
jobs-steps: &build-steps
  steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Set Docker metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: dimensionalos/${{ matrix.name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,format=short
    
    # - name: Login to DockerHub
    #   uses: docker/login-action@v3
    #   with:
    #     username: ${{ secrets.DOCKERHUB_USERNAME }}
    #     password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event.inputs.push == 'true') }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max