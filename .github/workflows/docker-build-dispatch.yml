name: Docker Build Dispatch
on:
  workflow_dispatch:
    inputs:
      branch-tag:
        description: 'Branch or tag to build from'
        type: string
        required: true
      target:
        description: 'Target image to build'
        type: string
        required: true
      freespace:
        description: 'Free up disk space before building'
        type: boolean
        default: false
      context:
        description: 'Docker build context'
        type: string
        default: '.'

# you can run this locally as well via
# ./bin/dockerbuild [image-name]
jobs:
  build:
    runs-on: dimos-runner-ubuntu-2204
    permissions:
      contents: read
      packages: write

    steps:
      - name: free up disk space
        # takes a bit of time, so disabled by default
        # explicitly enable this for large builds
        if: ${{ inputs.freespace }}
        run: |
          echo -e "pre cleanup space:\n $(df -h)"
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          echo -e "post cleanup space:\n $(df -h)"

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # required for github cache of docker layers
      - uses: crazy-max/ghaction-github-runtime@v3

      # required for github cache of docker layers
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true
          use: true

      - uses: docker/build-push-action@v6
        with:
          push: true
          context: ${{ inputs.context }}
          file:   docker/${{ inputs.target }}/Dockerfile
          tags:   ghcr.io/dimensionalos/${{ inputs.target }}:${{ inputs.branch-tag }}
          cache-from: type=gha,scope=${{ inputs.target }}
          cache-to:   type=gha,mode=max,scope=${{ inputs.target }}
          build-args: |
            FROM_TAG=${{ inputs.branch-tag }}