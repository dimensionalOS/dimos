name: tests

on:
 workflow_call:
   inputs:
     dev-image:
       required: true
       type: string
       default: "dev:dev"

permissions:
  contents: read
  packages: read

jobs:
  run-tests:
    runs-on: dimos-runner-ubuntu-2204

    container:
      image: ghcr.io/dimensionalos/${{ inputs.dev-image }}

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          git config --global --add safe.directory '*'
          /entrypoint.sh bash -c "pytest"
