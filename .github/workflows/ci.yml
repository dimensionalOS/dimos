name: ci
on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'

permissions:
  contents: read
  packages: read

jobs:
  checks:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 60
    runs-on: [self-hosted, Linux]
    container:
      image: ghcr.io/dimensionalos/ros-dev:dev
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}

    steps:
      - uses: actions/checkout@v5

      - name: Fix permissions
        run: |
          git config --global --add safe.directory '*'

      - name: Restore cached venv
        run: |
          cache_dir="${GITHUB_WORKSPACE}/../_venv_cache"
          mkdir -p "$cache_dir"
          hash=$(sha256sum uv.lock | cut -d' ' -f1)
          cached="${cache_dir}/venv-${hash}"
          if [ -d "$cached" ]; then
            cp -al "$cached" .venv
            echo "Restored venv from local cache"
          fi
          find "$cache_dir" -maxdepth 1 -name 'venv-*' ! -name "venv-${hash}" -exec rm -rf {} + 2>/dev/null || true

      - name: Install Python dependencies
        run: uv sync --all-extras --no-extra dds --frozen

      - name: Cache venv locally
        run: |
          cache_dir="${GITHUB_WORKSPACE}/../_venv_cache"
          hash=$(sha256sum uv.lock | cut -d' ' -f1)
          cached="${cache_dir}/venv-${hash}"
          [ -d "$cached" ] || cp -al .venv "$cached"

      - name: Remove pydrake stubs
        run: |
          find .venv/lib/*/site-packages/pydrake -name '*.pyi' -delete 2>/dev/null || true

      - name: Run tests
        if: github.event_name != 'push'
        run: |
          /entrypoint.sh bash -c "source .venv/bin/activate && pytest --durations=0 -m 'not (tool or mujoco)'"

      - name: Run tests with coverage
        if: github.event_name == 'push'
        run: |
          /entrypoint.sh bash -c "source .venv/bin/activate && _DIMOS_COV=1 coverage run -m pytest --durations=0 -m 'not (tool or mujoco)' && coverage combine && coverage html && coverage report"

      - name: Run mypy
        if: ${{ !cancelled() }}
        run: |
          /entrypoint.sh bash -c "source .venv/bin/activate && MYPYPATH=/opt/ros/humble/lib/python3.10/site-packages mypy dimos"

      - name: Upload coverage report
        if: github.event_name == 'push' && !cancelled()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: htmlcov/

      - name: Check disk space
        if: failure()
        run: |
          df -h
