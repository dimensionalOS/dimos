name: build-devcontainer

permissions:
  contents: read
  packages: write

on:
  push:
    paths: ["flake.*", ".github/workflows/build-devcontainer.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
      # pull to load the cache
      - run: docker pull ghcr.io/dimensionalos/dimos-dev:latest || true
      - run: nix build .#devcontainer
      - run: |
          nix run .#devcontainer.copyToDockerDaemon
          docker tag dimensionalos/dimos-dev:latest ghcr.io/dimensionalos/dimos-dev:latest
          #echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          #docker push ghcr.io/dimensionalos/dimos-dev:latest
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/dimensionalos/dimos-dev:latest
