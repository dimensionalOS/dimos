name: docker-build-template
on:
  workflow_call:
    inputs:
      image-tag:   { type: string, required: true }
      dockerfile:  { type: string, required: true }
      context:     { type: string, default: '.' }
      cache-scope: { type: string, required: true }

jobs:
  build:
    runs-on: dimos-runner-ubuntu-2204
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          push: true
          context: ${{ inputs.context }}
          file:   ${{ inputs.dockerfile }}
          tags:   ${{ inputs.image-tag }}
          cache-from: type=gha,scope=${{ inputs.cache-scope }}
          cache-to:   type=gha,mode=max,scope=${{ inputs.cache-scope }}
