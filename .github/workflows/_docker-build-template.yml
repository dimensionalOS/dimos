name: docker-build-template
on:
  workflow_call:
    inputs:
      branch-tag:   { type: string, required: true }
      target:      { type: string, required: true }
      freespace:   { type: boolean, default: false }
      context:     { type: string, default: '.' }

# you can run this locally as well via
# ./bin/dockerbuild [image-name]
jobs:
  build:
    runs-on: dimos-runner-ubuntu-2204
    permissions:
      contents: read
      packages: write

    steps:
      - name: free up disk space
        # takes a bit of time, so disabled by default
        # explicitly enable this for large builds
        if: ${{ inputs.freespace }}
        run: |
          echo -e "pre cleanup space:\n $(df -h)"
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          echo -e "post cleanup space:\n $(df -h)"

      - name: Determine Parent Docker Tag
        id: determine-tag
        run: |
          IMAGE_NAME="ghcr.io/dimensionalos/${{ inputs.target }}"
          TAG_TO_CHECK="{{ inputs.branch-tag }}"
          IMAGE_URL="https://ghcr.io/v2/dimensionalos/dev/tags/list"

          # Check if the tag exists using the Docker Registry HTTP API
          if curl -sSL $IMAGE_URL | grep -q "\"$TAG_TO_CHECK\""; then
            SELECTED_TAG=$TAG_TO_CHECK
          else
            SELECTED_TAG="dev"
          fi

          # Set the output for use in later steps
          echo "tag=$SELECTED_TAG" >> $GITHUB_OUTPUT


      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # required for github cache of docker layers
      - uses: crazy-max/ghaction-github-runtime@v3

      # required for github cache of docker layers
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true
          use: true

      - uses: docker/build-push-action@v6
        with:
          push: true
          context: ${{ inputs.context }}
          file:   docker/${{ inputs.target }}/Dockerfile
          tags:   ghcr.io/dimensionalos/${{ inputs.target }}:${{ inputs.branch-tag }}
          cache-from: type=gha,scope=${{ inputs.target }}
          cache-to:   type=gha,mode=max,scope=${{ inputs.target }}
          build-args: |
            FROM_TAG=${{ steps.determine-tag.outputs.tag }}
