name: docker-build-template
on:
  workflow_call:
    inputs:
      image-tag:   { type: string, required: true }
      target:      { type: string, required: true }
      context:     { type: string, default: '.' }

# you can run this locally as well via
# ./bin/dockerbuild [image-name]
jobs:
  build:
    runs-on: dimos-runner-ubuntu-2204
    permissions:
      contents: read
      packages: write

    steps:
      - name: free up disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # required for github cache of docker layers
      - uses: crazy-max/ghaction-github-runtime@v3

      - uses: docker/setup-buildx-action@v3
        # required for github cache of docker layers
        with:
          driver: docker-container
          install: true
          use: true

      - uses: docker/build-push-action@v6

        with:
          push: true
          context: ${{ inputs.context }}
          file:   docker/${{ inputs.target }}/Dockerfile
          tags:   ghcr.io/dimensionalos/${{ inputs.target }}:${{ inputs.image-tag }}
          cache-from: type=gha,scope=${{ inputs.target }}
          cache-to:   type=gha,mode=max,scope=${{ inputs.target }}
          build-args: |
            FROM_TAG=${{ inputs.image-tag }}
