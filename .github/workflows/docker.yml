name: docker-tree
on:
  push:
    branches: [ env/devcontainer2 ]

permissions:
  contents: read
  packages: write

# concurrency:
#   group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
#   # cancel previous workflows within the same branch or PR
#   cancel-in-progress: true

jobs:
  changes:
    runs-on: dimos-runner-ubuntu-2204
    outputs:
      ros:    ${{ steps.filter.outputs.ros }}
      python: ${{ steps.filter.outputs.python }}
      dev:    ${{ steps.filter.outputs.dev }}
      tests:  ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          filters: |
            ros:
              # ros rebuild will cascade to full rebuild
              # this is why changes to this workflow trigger ros
              - .github/workflows/_docker-build-template.yml
              - .github/workflows/docker.yml
              - docker/base-ros/**

            python:
              - docker/base-python/**
              - requirements*.txt

            dev:
              - docker/dev/**

            tests:
              - dimos/**

  debug-vars:
    runs-on: dimos-runner-ubuntu-2204
    needs: [changes]     # keep the links so we can read their data
    # The extra test on result makes the job “eligible” even if build-dev was skipped
    steps:
      - name: Show the values the test job uses
        env:
          TESTS_FLAG:       ${{ needs.changes.outputs.tests }}
          BUILD_DEV_RESULT: ${{ needs.build-dev.result }}
        run: |
          echo "needs.changes.outputs.tests    = '${TESTS_FLAG}'"
          echo "needs.build-dev.result         = '${BUILD_DEV_RESULT}'"

  build-ros:
    needs: changes
    if: needs.changes.outputs.ros == 'true'
    uses: ./.github/workflows/_docker-build-template.yml
    with:
      image-tag:   ghcr.io/dimensionalos/base-ros:latest
      dockerfile:  docker/base-ros/Dockerfile
      cache-scope: base-ros

  build-python:
    needs: [changes, build-ros]
    if: |
      ${{
      always() && !cancelled() &&
      ((needs.build-ros.result == 'success') ||
      (needs.build-ros.result == 'skipped' &&
      needs.changes.outputs.python == 'true'))
      }}

    uses: ./.github/workflows/_docker-build-template.yml
    with:
      image-tag:   ghcr.io/dimensionalos/base-ros-python:latest
      dockerfile:  docker/base-ros-python/Dockerfile
      cache-scope: base-python

  build-dev:
    needs: [changes, build-python]
    if: |
      ${{
      always() && !cancelled() &&
      ((needs.build-python.result == 'success') ||
      (needs.build-python.result == 'skipped' &&
      needs.changes.outputs.dev == 'true'))
      }}

    uses: ./.github/workflows/_docker-build-template.yml
    with:
      image-tag:   ghcr.io/dimensionalos/dev:latest
      dockerfile:  docker/dev/Dockerfile
      cache-scope: dev

  run-tests:
    runs-on: dimos-runner-ubuntu-2204
    needs: [changes, build-dev]
    if: |
      ${{
      always() && !cancelled() &&
      ((needs.build-python.result == 'success') ||
      (needs.build-python.result == 'skipped' &&
      needs.changes.outputs.tests == 'true'))
      }}

    container:
      image: ghcr.io/dimensionalos/dev:latest

    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          pwd
          ls
          pytest-3 -sv dimos/
