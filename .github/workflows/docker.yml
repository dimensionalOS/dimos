name: docker
on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  check-changes:
    runs-on: [self-hosted, Linux]
    outputs:
      ros:    ${{ steps.filter.outputs.ros }}
      python: ${{ steps.filter.outputs.python }}
      dev:    ${{ steps.filter.outputs.dev }}
      tests:  ${{ steps.filter.outputs.tests }}
      branch-tag: ${{ steps.set-tag.outputs.branch_tag }}
    steps:
      - name: Fix permissions
        run: |
          sudo chown -R $USER:$USER ${{ github.workspace }} || true
          
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          filters: |
            # ros and python are (alternative) root images
            # change to root stuff like docker.yml etc triggers rebuild of those
            # which cascades into a full rebuild
            ros:
              - .github/workflows/_docker-build-template.yml
              - .github/workflows/docker.yml
              - docker/ros/**

            python:
              - .github/workflows/_docker-build-template.yml
              - .github/workflows/docker.yml
              - docker/python/**
              - pyproject.toml

            dev:
              - docker/dev/**

            tests:
              - dimos/**

      - name: Determine Branch Tag
        id: set-tag
        run: |
          case "${GITHUB_REF_NAME}" in
            main) branch_tag="latest" ;;
            dev)    branch_tag="dev"    ;;
            *)
              branch_tag=$(echo "${GITHUB_REF_NAME}" \
                  | tr '[:upper:]' '[:lower:]' \
                  | sed -E 's#[^a-z0-9_.-]+#_#g' \
                  | sed -E 's#^-+|-+$##g')
              ;;
          esac
          echo "branch tag determined: ${branch_tag}"
          echo branch_tag="${branch_tag}" >> "$GITHUB_OUTPUT"

  # just a debugger
  inspect-needs:
    needs: [check-changes, ros]
    runs-on: dimos-runner-ubuntu-2204
    if: always()
    steps:
      - run: |
          echo '${{ toJSON(needs) }}'

  ros:
    needs: [check-changes]
    if: needs.check-changes.outputs.ros == 'true'
    uses: ./.github/workflows/_docker-build-template.yml
    with:
      should-run: true
      from-image: ubuntu:22.04
      to-image: ghcr.io/dimensionalos/ros:${{ needs.check-changes.outputs.branch-tag }}
      dockerfile:  ros

  ros-python:
    needs: [check-changes, ros]
    if: always()
    uses: ./.github/workflows/_docker-build-template.yml
    with:
      should-run: ${{
        needs.check-changes.outputs.python == 'true' &&
        needs.check-changes.result != 'error' &&
        needs.ros.result != 'error'
        }}

      from-image: ghcr.io/dimensionalos/ros:${{ needs.ros.result == 'success' && needs.check-changes.outputs.branch-tag || 'dev' }}
      to-image: ghcr.io/dimensionalos/ros-python:${{ needs.check-changes.outputs.branch-tag }}
      dockerfile:  python

  python:
    needs: [check-changes]
    if: needs.check-changes.outputs.python == 'true'
    uses: ./.github/workflows/_docker-build-template.yml
    with:
      should-run: true
      dockerfile:  python
      from-image: ubuntu:22.04
      to-image: ghcr.io/dimensionalos/python:${{ needs.check-changes.outputs.branch-tag }}

  dev:
    needs: [check-changes, python]
    if: always()

    uses: ./.github/workflows/_docker-build-template.yml
    with:
      should-run: ${{
        needs.check-changes.result == 'success' &&
        ((needs.python.result == 'success') ||
        (needs.python.result == 'skipped' &&
        needs.check-changes.outputs.dev == 'true')) }}
      from-image: ghcr.io/dimensionalos/python:${{ needs.python.result == 'success' && needs.check-changes.outputs.branch-tag || 'dev' }}
      to-image: ghcr.io/dimensionalos/dev:${{ needs.check-changes.outputs.branch-tag }}
      dockerfile: dev

  ros-dev:
    needs: [check-changes, ros-python]
    if: always()
    uses: ./.github/workflows/_docker-build-template.yml
    with:
      should-run: ${{
        needs.check-changes.result == 'success' && 
        (needs.check-changes.outputs.dev == 'true' ||
         (needs.ros-python.result == 'success' && (needs.check-changes.outputs.python == 'true' || needs.check-changes.outputs.ros == 'true')))
        }}
      from-image: ghcr.io/dimensionalos/ros-python:${{ needs.ros-python.result == 'success' && needs.check-changes.outputs.branch-tag || 'dev' }}
      to-image: ghcr.io/dimensionalos/ros-dev:${{ needs.check-changes.outputs.branch-tag }}
      dockerfile: dev

  run-ros-tests:
    needs: [check-changes, ros-dev]
    if: always()
    uses: ./.github/workflows/tests.yml
    secrets: inherit
    with:
      should-run: ${{
        needs.check-changes.result == 'success' &&
        ((needs.ros-dev.result == 'success') ||
        (needs.ros-dev.result == 'skipped' &&
        needs.check-changes.outputs.tests == 'true'))
        }}
      cmd: "pytest && pytest -m ros" # run tests that depend on ros as well
      dev-image: ros-dev:${{ (needs.check-changes.outputs.python == 'true' || needs.check-changes.outputs.dev == 'true' || needs.check-changes.outputs.ros == 'true') && needs.ros-dev.result == 'success' && needs.check-changes.outputs.branch-tag || 'dev' }}

  run-tests:
    needs: [check-changes, dev]
    if: always()
    uses: ./.github/workflows/tests.yml
    secrets: inherit
    with:
      should-run: ${{
        needs.check-changes.result == 'success' &&
        ((needs.dev.result == 'success') ||
        (needs.dev.result == 'skipped' &&
        needs.check-changes.outputs.tests == 'true'))
        }}
      cmd: "pytest"
      dev-image: dev:${{ (needs.check-changes.outputs.python == 'true' || needs.check-changes.outputs.dev == 'true') && needs.dev.result == 'success' && needs.check-changes.outputs.branch-tag || 'dev' }}

  # we run in parallel with normal tests for speed
  run-heavy-tests:
    needs: [check-changes, dev]
    if: always()
    uses: ./.github/workflows/tests.yml
    secrets: inherit
    with:
      should-run: ${{
        needs.check-changes.result == 'success' &&
        ((needs.dev.result == 'success') ||
        (needs.dev.result == 'skipped' &&
        needs.check-changes.outputs.tests == 'true'))
        }}
      cmd: "pytest -m heavy"
      dev-image: dev:${{ (needs.check-changes.outputs.python == 'true' || needs.check-changes.outputs.dev == 'true') && needs.dev.result == 'success' && needs.check-changes.outputs.branch-tag || 'dev' }}

  run-lcm-tests:
    needs: [check-changes, dev]
    if: always()
    uses: ./.github/workflows/tests.yml
    secrets: inherit
    with:
      should-run: ${{
        needs.check-changes.result == 'success' &&
        ((needs.dev.result == 'success') ||
        (needs.dev.result == 'skipped' &&
        needs.check-changes.outputs.tests == 'true'))
        }}
      cmd: "pytest -m lcm"
      dev-image: dev:${{ (needs.check-changes.outputs.python == 'true' || needs.check-changes.outputs.dev == 'true') && needs.dev.result == 'success' && needs.check-changes.outputs.branch-tag || 'dev' }}

  # Prepare the various tarballs and other blobs from DimOS that will be baked
  # into the Ubuntu installer image as preinstalled DimOS components (Docker images,
  # source code archives, and APT repository data), then build the complete Ubuntu
  # installer image (.img file) containing all these components.
  build-installer:
    needs: [check-changes, dev]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.dev.result == 'success' }}
    runs-on: [self-hosted, Linux]
    outputs:
      img-file: ${{ steps.build-img.outputs.img-file }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install required tools
        run: |
          bash scripts/installer/build-installer.sh install-tools

      - name: Download ubuntu-image tool
        run: |
          bash scripts/installer/build-installer.sh download-ubuntu-image-tool \
            --staging-dir "${{ runner.temp }}/dimos-installer-staging"

      # Git LFS is needed for the source code archive.
      # We do all of this on the runner server to ensure
      # that the OS distro is fully offline and the user can
      # use the source immediately upon booting.
      - name: Install Git LFS files
        run: |
          bash scripts/installer/build-installer.sh install-git-lfs-files \
            --workspace "${{ github.workspace }}"

      # Same as above: the devcontainer CLI is needed for the
      # dimos CLI.
      - name: Install devcontainer CLI
        run: |
          bash scripts/installer/build-installer.sh install-devcontainer-cli \
            --workspace "${{ github.workspace }}"

      # This usually takes about 20min.
      # Tar everything up for the installer image.
      - name: Prepare installer components
        run: |
          bash scripts/installer/build-installer.sh prepare-dimos-img-components \
            --docker-image-tag "${{ needs.check-changes.outputs.branch-tag }}" \
            --staging-dir "${{ runner.temp }}/dimos-installer-staging" \
            --workspace "${{ github.workspace }}"

      - name: Substitute tokens in YAML file
        run: |
          # Calculate relative paths from YAML file location (scripts/installer/) to staging files
          # YAML file is at: scripts/installer/ubuntu-desktop-installer-amd64.yaml
          # Staging dir is at: ${{ runner.temp }}/dimos-installer-staging
          # We need relative paths from scripts/installer/ to the staging files
          # (Necessary because ubuntu-image's manualCopyFile always joins confDefPath with source,
          # even for absolute paths.)

          YAML_FILE="${{ github.workspace }}/scripts/installer/ubuntu-desktop-installer-amd64.yaml"
          STAGING_DIR="${{ runner.temp }}/dimos-installer-staging"
          WORKSPACE_DIR="${{ github.workspace }}"
          DOCKER_TAG="${{ needs.check-changes.outputs.branch-tag }}"

          DOCKER_IMAGES_FILE="$STAGING_DIR/docker-images/dimos-images-$DOCKER_TAG.tar.gz"

          # Calculate relative paths using the action verb
          DOCKER_REL_PATH=$(bash scripts/installer/build-installer.sh determine-path-relative-to \
            --anchor-path "$YAML_FILE" \
            --path-to-be-relativized "$DOCKER_IMAGES_FILE")

          WORKSPACE_REL_PATH=$(bash scripts/installer/build-installer.sh determine-path-relative-to \
            --anchor-path "$YAML_FILE" \
            --path-to-be-relativized "$WORKSPACE_DIR")

          # Substitute tokens
          bash scripts/installer/build-installer.sh substitute-tokens \
            --input-file "$YAML_FILE" \
            --input-token "<{dimos-docker-images-tarball}>" \
            --substitute-string "$DOCKER_REL_PATH"

          bash scripts/installer/build-installer.sh substitute-tokens \
            --input-file "$YAML_FILE" \
            --input-token "<{dimos-completed-git-tree}>" \
            --substitute-string "$WORKSPACE_REL_PATH"

      # This usually takes between 2 & 2.5 hours.
      - name: Build installer image
        id: build-img
        run: |
          bash scripts/installer/build-installer.sh build-img \
            --docker-image-tag "${{ needs.check-changes.outputs.branch-tag }}" \
            --staging-dir "${{ runner.temp }}/dimos-installer-staging" \
            --workspace "${{ github.workspace }}" \
            --sha "${{ github.sha }}" \
            --ubuntu-image-tool-dir "${{ runner.temp }}/dimos-installer-staging/ubuntu-image-tool-git" \
            --log-file "${{ runner.temp }}/dimos-installer-staging/ubuntu-image-build.log" \
            --clean-ubuntu-image-tool-staging-first

  # Run module tests directly to avoid pytest forking issues
  # run-module-tests:
