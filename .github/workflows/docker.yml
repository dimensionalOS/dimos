name: docker-tree
on: push

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  IMAGE_TAG: ${{ github.ref_name == 'master' && 'latest' || github.ref_name }}

jobs:
  check-changes:
    runs-on: dimos-runner-ubuntu-2204
    outputs:
      ros:    ${{ steps.filter.outputs.ros }}
      python: ${{ steps.filter.outputs.python }}
      dev:    ${{ steps.filter.outputs.dev }}
      tests:  ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          filters: |
            ros:
              - .github/workflows/_docker-build-template.yml
              - .github/workflows/docker.yml
              - docker/base-ros/**

            python:
              - docker/base-python/**
              - requirements*.txt

            dev:
              - docker/dev/**

            tests:
              - dimos/**

  set-tag:
    runs-on: dimos-runner-ubuntu-2204
    outputs:
      image-tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - name: Determine Image Tag
        id: set-tag
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            master) image_tag="latest" ;;
            dev)    image_tag="dev"    ;;
            *)
              image_tag=$(echo "${GITHUB_REF_NAME}" \
                  | tr '[:upper:]' '[:lower:]' \
                  | sed -E 's#[^a-z0-9_.-]+#_#g' \
                  | sed -E 's#^-+|-+$##g')
              ;;
          esac
          echo "image tag determined: ${image_tag}"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: dimos-runner-ubuntu-2204
    needs: [check-changes, set-tag]
    if: needs.check-changes.result == 'success'
    steps:
      - name: Build base‑ros
        if: needs.check-changes.outputs.ros == 'true'
        uses: ./.github/actions/docker-build
        with:
          target: base-ros
          tag:    ${{ needs.set-tag.outputs.image-tag }}

      - name: Build base‑ros‑python
        if: needs.check-changes.outputs.python == 'true'
        uses: ./.github/actions/docker-build
        with:
          target: base-ros-python
          tag:    ${{ needs.set-tag.outputs.image-tag }}
          freespace: true

      - name: Build dev
        if: needs.check-changes.outputs.dev == 'true'
        uses: ./.github/actions/docker-build
        with:
          target: dev
          tag:    ${{ needs.set-tag.outputs.image-tag }}

  run-tests:
    runs-on: dimos-runner-ubuntu-2204
    needs: [check-changes, set-tag, build]
    if: |
      ${{
        needs.check-changes.result == 'success' &&
        needs.check-changes.outputs.tests == 'true' &&
        needs.build.result == 'success'
      }}
    uses: ./.github/workflows/pytest.yml
    with:
      imagetag: ${{ needs.set-tag.outputs.image-tag }}
