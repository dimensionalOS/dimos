name: docker-tree

on: push

#  pull_request:
#    branches:
#      - dev
#      - main
#      - master

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  IMAGE_TAG: ${{ github.ref_name == 'master' && 'latest' || github.ref_name }}


jobs:
  check-changes:
    runs-on: dimos-runner-ubuntu-2204
    outputs:
      ros:    ${{ steps.filter.outputs.ros }}
      python: ${{ steps.filter.outputs.python }}
      dev:    ${{ steps.filter.outputs.dev }}
      tests:  ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          filters: |
            ros:
              # ros rebuild will cascade to full rebuild
              # this is why check-changes to this workflow trigger ros
              - .github/workflows/_docker-build-template.yml
              - .github/workflows/docker.yml
              - docker/base-ros/**

            python:
              - docker/base-python/**
              - requirements*.txt

            dev:
              - docker/dev/**

            tests:
              - dimos/**

  # this needs a fix, for now it's always "latest"
  set-tag:
    runs-on: dimos-runner-ubuntu-2204
    outputs:
      image-tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - name: Determine Image Tag
        id: set-tag
        run: |
          case "${GITHUB_REF_NAME}" in
            master) image_tag="latest" ;;
            dev)    image_tag="dev"    ;;
            *)
              image_tag=$(echo "${GITHUB_REF_NAME}" \
                  | tr '[:upper:]' '[:lower:]' \
                  | sed -E 's#[^a-z0-9_.-]+#-#g' \
                  | sed -E 's#^-+|-+$##g')
              image_tag="${image_tag:0:128}"
              ;;
          esac
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

  build-ros:
    needs: [check-changes, set-tag]
    if: needs.check-changes.outputs.ros == 'true'
    uses: ./.github/workflows/_docker-build-template.yml
    with:
      image-tag:   ghcr.io/dimensionalos/base-ros:${{ needs.set-tag.outputs.image-tag }}
      dockerfile:  docker/base-ros/Dockerfile
      cache-scope: base-ros

  # inspect-needs:
  #   needs: [check-changes, set-tag, build-ros]
  #   runs-on: dimos-runner-ubuntu-2204
  #   if: always()
  #   steps:
  #     - run: |
  #         echo '=== needs context ==='
  #         echo '${{ toJSON(needs) }}'

  build-python:
    needs: [check-changes, set-tag, build-ros]
    if: |
      ${{
      always() && !cancelled() &&
      needs.check-changes.result == 'success' &&
      ((needs.build-ros.result == 'success') ||
      (needs.build-ros.result == 'skipped' &&
      needs.check-changes.outputs.python == 'true'))

      }}

    uses: ./.github/workflows/_docker-build-template.yml
    with:
      image-tag:   ghcr.io/dimensionalos/base-ros-python:${{ needs.set-tag.outputs.image-tag }}
      dockerfile:  docker/base-ros-python/Dockerfile
      cache-scope: base-python

  build-dev:
    needs: [check-changes, set-tag, build-python]
    if: |
      ${{
      always() && !cancelled() &&
      needs.check-changes.result == 'success' &&
      ((needs.build-python.result == 'success') ||
      (needs.build-python.result == 'skipped' &&
      needs.check-changes.outputs.dev == 'true'))
      }}

    uses: ./.github/workflows/_docker-build-template.yml
    with:
      image-tag:   ghcr.io/dimensionalos/dev:${{ needs.set-tag.outputs.image-tag }}
      dockerfile:  docker/dev/Dockerfile
      cache-scope: dev

  run-tests:
    needs: [check-changes, set-tag, build-dev]
    if: |
      ${{
      always() && !cancelled() &&
      needs.check-changes.result == 'success' &&
      ((needs.build-dev.result == 'success') ||
      (needs.build-dev.result == 'skipped' &&
      needs.check-changes.outputs.tests == 'true'))
      }}
    uses: ./.github/workflows/pytest.yml
    with:
      imagetag: ${{ needs.set-tag.outputs.image-tag }}
