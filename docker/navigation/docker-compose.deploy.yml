# =============================================================================
# DEPLOYMENT VERSION - Uses pre-built Docker Hub image (bonaiserve/dimos_autonomy_stack)
# =============================================================================
#
# Usage:
#   Hardware:   ./start.sh --hardware
#   With tag:   ./start.sh --hardware --tag humble-fastlio
#
# Image tag format: {ROS_DISTRO}-{SLAM_TYPE} (e.g., humble-arise, humble-fastlio, jazzy-arise)
#
# =============================================================================

services:
  # Simulation profile
  dimos_simulation:
    image: bonaiserve/dimos_autonomy_stack:${IMAGE_TAG:-humble-arise}
    container_name: dimos_simulation_container
    profiles: ["", "simulation"]  # Active by default (empty profile) AND with --profile simulation

    # Shared memory size for ROS 2 FastDDS
    shm_size: '8gb'

    # Enable interactive terminal
    stdin_open: true
    tty: true

    # Network configuration - required for ROS communication
    network_mode: host

    # Allow `ip link set ...` (needed by DimOS LCM autoconf) without requiring sudo
    cap_add:
      - NET_ADMIN

    # Use nvidia runtime for GPU acceleration (falls back to runc if not available)
    runtime: ${DOCKER_RUNTIME:-nvidia}

    # Environment variables for display and ROS
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-all}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - ROBOT_CONFIG_PATH=${ROBOT_CONFIG_PATH:-mechanum_drive}
      - ROBOT_IP=${ROBOT_IP:-}
      - HARDWARE_MODE=false
      # DDS Configuration (FastDDS)
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTRTPS_DEFAULT_PROFILES_FILE=/ros2_ws/config/fastdds.xml
      # Localization method selection (arise_slam or fastlio)
      - LOCALIZATION_METHOD=${LOCALIZATION_METHOD:-arise_slam}

    # Volume mounts
    volumes:
      # X11 socket for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw

      # Mount Unity environment models (if available)
      - ./unity_models:/ros2_ws/src/ros-navigation-autonomy-stack/src/base_autonomy/vehicle_simulator/mesh/unity:rw

      # Mount bagfiles directory
      - ./bagfiles:/ros2_ws/bagfiles:rw

      # Mount config files for easy editing
      - ./config:/ros2_ws/config:rw

    # Device access (for joystick controllers)
    devices:
      - /dev/input:/dev/input
      - /dev/dri:/dev/dri

    # Working directory
    working_dir: /ros2_ws

    # Command to run navigation simulation
    command: /usr/local/bin/run_both.sh

  # Hardware profile - for real robot
  dimos_hardware:
    image: bonaiserve/dimos_autonomy_stack:${IMAGE_TAG:-humble-arise}
    container_name: dimos_hardware_container
    profiles: ["hardware"]

    # Shared memory size for ROS 2 FastDDS
    shm_size: '8gb'

    # Load environment from .env file
    env_file:
      - .env

    # Enable interactive terminal
    stdin_open: true
    tty: true

    # Network configuration - MUST be host for hardware access
    network_mode: host

    # Privileged mode REQUIRED for hardware access
    privileged: true

    # Override runtime for GPU support
    runtime: ${DOCKER_RUNTIME:-runc}

    # Add host groups for device access (input for joystick, dialout for serial)
    group_add:
      - ${INPUT_GID:-995}
      - ${DIALOUT_GID:-20}

    # Hardware environment variables
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - ROBOT_CONFIG_PATH=${ROBOT_CONFIG_PATH:-mechanum_drive}
      - ROBOT_IP=${ROBOT_IP:-}
      - HARDWARE_MODE=true
      # DDS Configuration (FastDDS)
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTRTPS_DEFAULT_PROFILES_FILE=/ros2_ws/config/fastdds.xml
      # Mid-360 Lidar configuration
      - LIDAR_INTERFACE=${LIDAR_INTERFACE:-}
      - LIDAR_COMPUTER_IP=${LIDAR_COMPUTER_IP:-192.168.1.5}
      - LIDAR_GATEWAY=${LIDAR_GATEWAY:-192.168.1.1}
      - LIDAR_IP=${LIDAR_IP:-192.168.1.116}
      # Motor controller
      - MOTOR_SERIAL_DEVICE=${MOTOR_SERIAL_DEVICE:-/dev/ttyACM0}
      # Network optimization
      - ENABLE_WIFI_BUFFER=true
      # Route planner option
      - USE_ROUTE_PLANNER=${USE_ROUTE_PLANNER:-false}
      # RViz option
      - USE_RVIZ=${USE_RVIZ:-false}
      # Unitree robot configuration
      - USE_UNITREE=${USE_UNITREE:-false}
      - UNITREE_IP=${UNITREE_IP:-192.168.12.1}
      - UNITREE_CONN=${UNITREE_CONN:-LocalAP}
      # RealSense camera configuration
      - USE_REALSENSE=${USE_REALSENSE:-false}
      - REALSENSE_SERIAL=${REALSENSE_SERIAL:-}
      # SLAM voxel resolution configuration
      - AUTO_VOXEL_SIZE=${AUTO_VOXEL_SIZE:-false}
      - MAPPING_LINE_RESOLUTION=${MAPPING_LINE_RESOLUTION:-0.02}
      - MAPPING_PLANE_RESOLUTION=${MAPPING_PLANE_RESOLUTION:-0.02}
      # Localization method selection (arise_slam or fastlio)
      - LOCALIZATION_METHOD=${LOCALIZATION_METHOD:-arise_slam}
      # ROS bag recording (empty = disabled, or: default, full, slam, all)
      - RECORD_BAG=${RECORD_BAG:-}

    # Volume mounts
    volumes:
      # X11 socket for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
      # Mount Unity environment models (optional for hardware)
      - ./unity_models:/ros2_ws/src/ros-navigation-autonomy-stack/src/base_autonomy/vehicle_simulator/mesh/unity:rw
      # Mount bagfiles directory
      - ./bagfiles:/ros2_ws/bagfiles:rw
      # Mount data directory for bag recordings
      - ${HOME}/Downloads/data:/ros2_ws/data:rw
      # Mount data recording directory
      - ${HOME}/Downloads/data:/ros2_ws/data:rw
      # Mount config files for easy editing
      - ./config:/ros2_ws/config:rw
      # Hardware-specific volumes
      - ./logs:/ros2_ws/logs:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /dev/bus/usb:/dev/bus/usb:rw
      - /sys:/sys:ro

    # Device access for hardware
    devices:
      # Joystick controller (specific device to avoid permission issues)
      - /dev/input/js0:/dev/input/js0
      # GPU access
      - /dev/dri:/dev/dri
      # Motor controller serial ports
      - ${MOTOR_SERIAL_DEVICE:-/dev/ttyACM0}:${MOTOR_SERIAL_DEVICE:-/dev/ttyACM0}

    # Working directory
    working_dir: /ros2_ws

    # Command - launch the real robot system with foxglove_bridge
    command:
      - bash
      - -c
      - |
        echo "Checking joystick..."
        ls -la /dev/input/js0 2>/dev/null || echo "Warning: No joystick found at /dev/input/js0"
        cd /ros2_ws
        source install/setup.bash
        source /opt/dimos-venv/bin/activate
        # Launch FASTLIO2 autonomy bridge (SLAM + localization)
        echo "Starting FASTLIO2 autonomy..."
        ros2 launch fastlio2_autonomy_bridge fastlio2_autonomy.launch.py &
        sleep 2
        # Launch Mid-360 lidar driver
        echo "Starting Mid-360 lidar driver..."
        ros2 launch livox_ros_driver2 msg_MID360_launch.py &
        sleep 2
        # Launch terrain analysis
        echo "Starting terrain analysis..."
        ros2 launch terrain_analysis terrain_analysis.launch.py &
        sleep 1
        # Launch terrain analysis ext
        echo "Starting terrain analysis ext..."
        ros2 launch terrain_analysis_ext terrain_analysis_ext.launch &
        sleep 1
        # Launch sensor scan generation
        echo "Starting sensor scan generation..."
        ros2 launch sensor_scan_generation sensor_scan_generation.launch &
        sleep 1
        # Launch local planner
        echo "Starting local planner..."
        ros2 launch local_planner local_planner.launch.py realRobot:=true &
        sleep 2
        # Launch FAR planner (route planner) if enabled
        if [ "$USE_ROUTE_PLANNER" = "true" ]; then
            echo "Starting FAR planner (route planner)..."
            ros2 launch far_planner far_planner.launch &
            sleep 2
        fi
        if [ "$USE_RVIZ" = "true" ]; then
            echo "Starting RViz2..."
            if [ "$USE_ROUTE_PLANNER" = "true" ]; then
                ros2 run rviz2 rviz2 -d /ros2_ws/src/ros-navigation-autonomy-stack/src/route_planner/far_planner/rviz/default.rviz &
            else
                ros2 run rviz2 rviz2 -d /ros2_ws/src/ros-navigation-autonomy-stack/src/base_autonomy/vehicle_simulator/rviz/vehicle_simulator.rviz &
            fi
        fi
        # Launch Unitree control if USE_UNITREE is true
        if [ "$USE_UNITREE" = "true" ]; then
            echo "Starting Unitree WebRTC control (IP: $UNITREE_IP, Method: $UNITREE_CONN)..."
            ros2 launch unitree_webrtc_ros unitree_control.launch.py robot_ip:=$UNITREE_IP connection_method:=$UNITREE_CONN &
        fi
        # Launch RealSense camera if enabled
        if [ "$USE_REALSENSE" = "true" ]; then
            echo "Starting RealSense camera..."
            if [ -n "$REALSENSE_SERIAL" ]; then
                ros2 launch realsense2_camera rs_launch.py serial_no:=$REALSENSE_SERIAL \
                    enable_color:=true enable_depth:=true \
                    rgb_camera.color_profile:=640,480,5 depth_module.depth_profile:=640,480,5 \
                    pointcloud.enable:=true align_depth.enable:=true &
            else
                ros2 launch realsense2_camera rs_launch.py \
                    enable_color:=true enable_depth:=true \
                    rgb_camera.color_profile:=640,480,5 depth_module.depth_profile:=640,480,5 \
                    pointcloud.enable:=true align_depth.enable:=true &
            fi
            sleep 2
        fi
        # Start twist relay for Foxglove Teleop (converts Twist -> TwistStamped)
        echo "Starting Twist relay for Foxglove Teleop..."
        python3 /usr/local/bin/twist_relay.py &
        # Start goal autonomy relay (publishes Joy to enable autonomy when goal_pose received)
        echo "Starting Goal Autonomy relay for Foxglove..."
        python3 /usr/local/bin/goal_autonomy_relay.py &
        # Start map saver service (call /save_map from Foxglove to save point cloud)
        echo "Starting Map Saver Service..."
        python3 /usr/local/bin/map_saver_service.py &
        # Start ROS bag recording if enabled
        if [ -n "$RECORD_BAG" ]; then
            echo "Starting ROS bag recording (mode: $RECORD_BAG)..."
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            DATA_DIR="/ros2_ws/data"
            mkdir -p $DATA_DIR
            SPLIT_SIZE="500000000"
            if [ "$RECORD_BAG" = "all" ]; then
                echo "Recording ALL topics to $DATA_DIR/${TIMESTAMP}_all"
                ros2 bag record -a -o $DATA_DIR/${TIMESTAMP}_all -b $SPLIT_SIZE &
            elif [ "$RECORD_BAG" = "full" ]; then
                echo "Recording FULL camera+nav topics to $DATA_DIR/${TIMESTAMP}_full"
                ros2 bag record -o $DATA_DIR/${TIMESTAMP}_full -b $SPLIT_SIZE /camera/camera/color/image_raw /camera/camera/depth/image_rect_raw /state_estimation /terrain_map /tf &
            elif [ "$RECORD_BAG" = "slam" ]; then
                echo "Recording SLAM topics to $DATA_DIR/${TIMESTAMP}_slam"
                ros2 bag record -o $DATA_DIR/${TIMESTAMP}_slam -b $SPLIT_SIZE /state_estimation /registered_scan /lidar/scan /imu/data /terrain_map /tf &
            else
                echo "Recording DEFAULT topics to $DATA_DIR/${TIMESTAMP}"
                ros2 bag record -o $DATA_DIR/${TIMESTAMP} -b $SPLIT_SIZE /state_estimation /terrain_map /tf &
            fi
            echo "Recording started"
        fi
        echo "Starting Foxglove Bridge on port 8765..."
        echo "Connect via Foxglove Studio: ws://$(hostname -I | awk '{print $1}'):8765"
        ros2 launch foxglove_bridge foxglove_bridge_launch.xml port:=8765

    # Capabilities for hardware operations
    cap_add:
      - NET_ADMIN  # Network interface configuration
      - SYS_ADMIN  # System operations
      - SYS_TIME   # Time synchronization
