# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
---
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      - pip install uv
    post_install:
      # uv sync ignores VIRTUAL_ENV and targets .venv; UV_PROJECT_ENVIRONMENT is what
      # points it at RTD's build venv, so the deps land where sphinx-build runs.
      - UV_PROJECT_ENVIRONMENT=$READTHEDOCS_VIRTUALENV_PATH uv sync --frozen --only-group docs

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true
...
