<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" role="img" aria-labelledby="title desc">
  <title id="title">DimOS Project Architecture With Go2 Agentic Extension</title>
  <desc id="desc">A scientific-style system architecture diagram showing the DimOS project runtime and a zoomed Go2 agentic self-evolution extension in one figure.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 11 5.5 L 0 11 z" fill="#1f2933"/>
    </marker>
    <marker id="arrowBlue" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 11 5.5 L 0 11 z" fill="#1f5fbf"/>
    </marker>
    <marker id="arrowPurple" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 11 5.5 L 0 11 z" fill="#6f3cc3"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; fill: #182433; }
      .title { font-size: 40px; font-weight: 800; }
      .subtitle { font-size: 16px; font-weight: 600; fill: #53616f; }
      .panel-label { font-size: 28px; font-weight: 800; fill: #111827; }
      .section { font-size: 22px; font-weight: 800; }
      .box-label { font-size: 16px; font-weight: 750; }
      .small { font-size: 13px; font-weight: 600; fill: #53616f; }
      .tiny { font-size: 11.5px; font-weight: 600; fill: #65727e; }
      .caption { font-size: 13px; font-weight: 600; fill: #4f5b67; }
      .panel { fill: #ffffff; stroke: #3f4a56; stroke-width: 2; }
      .neutral { fill: #f7f8fa; stroke: #6b7581; stroke-width: 1.7; }
      .blue { fill: #f4f8ff; stroke: #1f5fbf; stroke-width: 1.9; }
      .green { fill: #f5fbf3; stroke: #2f7d32; stroke-width: 1.8; }
      .amber { fill: #fff8e7; stroke: #bc7608; stroke-width: 1.8; }
      .purple { fill: #fbf8ff; stroke: #6f3cc3; stroke-width: 1.8; }
      .red { fill: #fff6f5; stroke: #b42318; stroke-width: 1.8; }
      .box { fill: #ffffff; stroke: #778492; stroke-width: 1.6; }
      .box-blue { fill: #ffffff; stroke: #1f5fbf; stroke-width: 1.7; }
      .box-green { fill: #ffffff; stroke: #2f7d32; stroke-width: 1.7; }
      .box-amber { fill: #ffffff; stroke: #bc7608; stroke-width: 1.7; }
      .box-purple { fill: #ffffff; stroke: #6f3cc3; stroke-width: 1.7; }
      .control { fill: none; stroke: #1f2933; stroke-width: 2.1; marker-end: url(#arrow); }
      .context { fill: none; stroke: #1f5fbf; stroke-width: 1.9; stroke-dasharray: 7 6; marker-end: url(#arrowBlue); }
      .artifact-flow { fill: none; stroke: #6f3cc3; stroke-width: 1.8; stroke-dasharray: 2 6; stroke-linecap: round; marker-end: url(#arrowPurple); }
      .optional-flow { fill: none; stroke: #6f3cc3; stroke-width: 1.8; stroke-dasharray: 10 6 2 6; marker-end: url(#arrowPurple); }
      .boundary { fill: none; stroke: #3f4a56; stroke-width: 1.7; stroke-dasharray: 9 6; }
      .optional-boundary { fill: #ffffff; stroke: #6f3cc3; stroke-width: 1.7; stroke-dasharray: 10 6; }
    </style>
  </defs>

  <rect width="1800" height="1280" fill="#ffffff"/>
  <text x="900" y="48" text-anchor="middle" class="title">DimOS 项目整体架构与 Go2 Agent 自进化扩展</text>
  <text x="900" y="76" text-anchor="middle" class="subtitle">Scientific-style composite figure: project runtime context plus the current Go2 agentic extension boundary.</text>

  <!-- Panel A: project-wide architecture -->
  <rect x="42" y="110" width="1716" height="480" rx="14" class="panel"/>
  <text x="70" y="148" class="panel-label">A</text>
  <text x="105" y="148" class="section">DimOS project architecture</text>

  <!-- Top row -->
  <rect x="85" y="180" width="250" height="92" rx="10" class="blue"/>
  <text x="210" y="210" text-anchor="middle" class="section" fill="#1f5fbf">Entry points</text>
  <rect x="110" y="225" width="86" height="34" rx="6" class="box"/>
  <text x="153" y="247" text-anchor="middle" class="box-label">CLI</text>
  <rect x="220" y="225" width="90" height="34" rx="6" class="box"/>
  <text x="265" y="247" text-anchor="middle" class="box-label">Python API</text>

  <rect x="400" y="180" width="300" height="92" rx="10" class="blue"/>
  <text x="550" y="210" text-anchor="middle" class="section" fill="#1f5fbf">Blueprint layer</text>
  <rect x="428" y="225" width="115" height="34" rx="6" class="box"/>
  <text x="486" y="247" text-anchor="middle" class="box-label">Blueprints</text>
  <rect x="562" y="225" width="110" height="34" rx="6" class="box"/>
  <text x="617" y="247" text-anchor="middle" class="box-label">Registry</text>

  <rect x="760" y="180" width="268" height="92" rx="10" class="blue"/>
  <text x="894" y="210" text-anchor="middle" class="section" fill="#1f5fbf">Configuration</text>
  <rect x="790" y="225" width="108" height="34" rx="6" class="box"/>
  <text x="844" y="247" text-anchor="middle" class="box-label">GlobalConfig</text>
  <rect x="918" y="225" width="80" height="34" rx="6" class="box"/>
  <text x="958" y="247" text-anchor="middle" class="box-label">.env</text>

  <rect x="1090" y="180" width="300" height="92" rx="10" class="purple"/>
  <text x="1240" y="210" text-anchor="middle" class="section" fill="#6f3cc3">External interfaces</text>
  <rect x="1118" y="225" width="90" height="34" rx="6" class="box"/>
  <text x="1163" y="247" text-anchor="middle" class="box-label">MCP</text>
  <rect x="1228" y="225" width="132" height="34" rx="6" class="box"/>
  <text x="1294" y="247" text-anchor="middle" class="box-label">Rerun / Web</text>

  <rect x="1450" y="180" width="260" height="92" rx="10" class="red"/>
  <text x="1580" y="210" text-anchor="middle" class="section" fill="#b42318">Targets</text>
  <text x="1580" y="238" text-anchor="middle" class="box-label">Robots / Simulation</text>
  <text x="1580" y="258" text-anchor="middle" class="small">Go2 · G1 · xArm · Drones · MuJoCo</text>

  <!-- Core runtime row -->
  <rect x="85" y="315" width="1625" height="112" rx="12" class="neutral"/>
  <text x="898" y="348" text-anchor="middle" class="section" fill="#4a4f55">Core runtime</text>
  <rect x="120" y="372" width="170" height="38" rx="7" class="box"/>
  <text x="205" y="396" text-anchor="middle" class="box-label">Module In[T]/Out[T]</text>
  <rect x="330" y="372" width="185" height="38" rx="7" class="box"/>
  <text x="423" y="396" text-anchor="middle" class="box-label">ModuleCoordinator</text>
  <rect x="555" y="372" width="155" height="38" rx="7" class="box"/>
  <text x="633" y="396" text-anchor="middle" class="box-label">Workers</text>
  <rect x="750" y="372" width="155" height="38" rx="7" class="box"/>
  <text x="828" y="396" text-anchor="middle" class="box-label">RPC / Specs</text>
  <rect x="945" y="372" width="155" height="38" rx="7" class="box"/>
  <text x="1023" y="396" text-anchor="middle" class="box-label">Messages</text>
  <rect x="1140" y="372" width="175" height="38" rx="7" class="box"/>
  <text x="1228" y="396" text-anchor="middle" class="box-label">Run registry/logs</text>
  <rect x="1360" y="372" width="295" height="38" rx="7" class="box"/>
  <text x="1508" y="396" text-anchor="middle" class="box-label">Lifecycle · deployment · system wiring</text>

  <!-- Transport and modules row -->
  <rect x="85" y="460" width="780" height="92" rx="12" class="amber"/>
  <text x="475" y="492" text-anchor="middle" class="section" fill="#bc7608">Communication layer</text>
  <text x="475" y="525" text-anchor="middle" class="box-label">LCM · Zenoh · SHM/pSHM · ROS · DDS · Tool streams · HTTP/WebSocket</text>

  <rect x="930" y="460" width="780" height="92" rx="12" class="green"/>
  <text x="1320" y="492" text-anchor="middle" class="section" fill="#2f7d32">Functional module families</text>
  <text x="1320" y="522" text-anchor="middle" class="box-label">Agents · Skills · Perception · Mapping · Navigation · Control · Manipulation · Learning</text>
  <text x="1320" y="542" text-anchor="middle" class="small">Data/model stores: LFS assets · Memory2 · vector/blob stores · VLM/embedding/segmentation models</text>

  <!-- Panel A flows -->
  <path d="M 335 226 L 400 226" class="control"/>
  <path d="M 700 226 L 760 226" class="context"/>
  <path d="M 1028 226 L 1090 226" class="context"/>
  <path d="M 1390 226 L 1450 226" class="context"/>
  <path d="M 550 272 L 550 315" class="control"/>
  <path d="M 898 427 L 898 460" class="control"/>
  <path d="M 865 506 L 930 506" class="control"/>
  <text x="900" y="585" text-anchor="middle" class="caption">Panel A abstracts the full repository. The Go2 agentic branch is one blueprint-specific extension within the Agents/Skills/Robot target path.</text>

  <!-- Zoom link from Panel A to Panel B -->
  <path d="M 1320 552 C 1350 612, 1395 612, 1425 650" class="context"/>
  <text x="1432" y="626" class="tiny">zoom into Go2 agentic blueprint</text>

  <!-- Panel B: Go2 agentic extension -->
  <rect x="42" y="640" width="1716" height="565" rx="14" class="panel"/>
  <text x="70" y="678" class="panel-label">B</text>
  <text x="105" y="678" class="section">Go2 agentic self-evolution extension inside DimOS</text>
  <text x="1070" y="678" class="tiny">Current `unitree_go2_agentic`: robot body + world state + skill interface + agent brain. WebsocketVis is optional and not wired here.</text>

  <!-- Layer boxes in Panel B -->
  <rect x="80" y="710" width="1265" height="118" rx="12" class="blue"/>
  <text x="712" y="742" text-anchor="middle" class="section" fill="#1f5fbf">Layer 3 Agent Brain</text>
  <rect x="105" y="765" width="125" height="38" rx="7" class="box-blue"/>
  <text x="168" y="789" text-anchor="middle" class="box-label">Prompt</text>
  <rect x="260" y="765" width="135" height="38" rx="7" class="box-blue"/>
  <text x="328" y="789" text-anchor="middle" class="box-label">Router</text>
  <rect x="425" y="765" width="155" height="38" rx="7" class="box-blue"/>
  <text x="503" y="789" text-anchor="middle" class="box-label">Context Provider</text>
  <rect x="610" y="765" width="150" height="38" rx="7" class="box-blue"/>
  <text x="685" y="789" text-anchor="middle" class="box-label">Feasibility</text>
  <rect x="790" y="765" width="130" height="38" rx="7" class="box-blue"/>
  <text x="855" y="789" text-anchor="middle" class="box-label">MCP</text>
  <rect x="950" y="735" width="135" height="38" rx="7" class="box-blue"/>
  <text x="1018" y="759" text-anchor="middle" class="box-label">Outcome Store</text>
  <rect x="1110" y="735" width="135" height="38" rx="7" class="box-blue"/>
  <text x="1178" y="759" text-anchor="middle" class="box-label">Causal Model</text>
  <rect x="1110" y="785" width="135" height="38" rx="7" class="box-blue"/>
  <text x="1178" y="809" text-anchor="middle" class="box-label">Skill Proposal</text>

  <rect x="80" y="860" width="760" height="95" rx="12" class="green"/>
  <text x="460" y="892" text-anchor="middle" class="section" fill="#2f7d32">Layer 4 World State</text>
  <rect x="110" y="910" width="175" height="32" rx="6" class="box-green"/>
  <text x="198" y="931" text-anchor="middle" class="box-label">Structured State</text>
  <rect x="320" y="910" width="195" height="32" rx="6" class="box-green"/>
  <text x="418" y="931" text-anchor="middle" class="box-label">Semantic Temporal Map</text>
  <rect x="550" y="910" width="120" height="32" rx="6" class="box-green"/>
  <text x="610" y="931" text-anchor="middle" class="box-label">Spatial/RAG</text>
  <rect x="695" y="910" width="110" height="32" rx="6" class="box-green"/>
  <text x="750" y="931" text-anchor="middle" class="box-label">Temporal</text>

  <rect x="80" y="985" width="760" height="88" rx="12" class="amber"/>
  <text x="460" y="1016" text-anchor="middle" class="section" fill="#bc7608">Layer 5 Skill Interface</text>
  <rect x="130" y="1032" width="180" height="30" rx="6" class="box-amber"/>
  <text x="220" y="1052" text-anchor="middle" class="box-label">Skill Contracts</text>
  <rect x="355" y="1032" width="180" height="30" rx="6" class="box-amber"/>
  <text x="445" y="1052" text-anchor="middle" class="box-label">Preflight Metadata</text>
  <rect x="590" y="1032" width="180" height="30" rx="6" class="box-amber"/>
  <text x="680" y="1052" text-anchor="middle" class="box-label">Go2 Skills</text>

  <rect x="80" y="1100" width="760" height="75" rx="12" class="neutral"/>
  <text x="460" y="1128" text-anchor="middle" class="section" fill="#4a4f55">Layer 6 Robot Body</text>
  <text x="460" y="1156" text-anchor="middle" class="box-label">Go2 Connection · Sensors/Odom · Motion Control</text>

  <!-- Artifacts and optional observability -->
  <rect x="910" y="860" width="330" height="170" rx="12" class="purple"/>
  <text x="1075" y="895" text-anchor="middle" class="section" fill="#6f3cc3">Local review artifacts</text>
  <text x="1075" y="920" text-anchor="middle" class="small">local JSON files; optional local Git commit; no automatic GitHub push</text>
  <rect x="950" y="945" width="250" height="32" rx="6" class="box-purple"/>
  <text x="1075" y="966" text-anchor="middle" class="box-label">.dimos/evolution/events</text>
  <rect x="950" y="985" width="250" height="32" rx="6" class="box-purple"/>
  <text x="1075" y="1006" text-anchor="middle" class="box-label">.dimos/evolution/proposals</text>

  <rect x="910" y="1058" width="330" height="117" rx="12" class="optional-boundary"/>
  <text x="1075" y="1092" text-anchor="middle" class="section" fill="#6f3cc3">Optional observability</text>
  <text x="1075" y="1118" text-anchor="middle" class="box-label">Rerun / WebsocketVis</text>
  <text x="1075" y="1142" text-anchor="middle" class="small">not wired by current `unitree_go2_agentic`</text>

  <!-- Legend -->
  <rect x="1300" y="860" width="395" height="315" rx="12" class="neutral"/>
  <text x="1498" y="895" text-anchor="middle" class="section">Legend and rigor notes</text>
  <path d="M 1330 930 L 1420 930" class="control"/>
  <text x="1440" y="935" class="box-label">control/tool call</text>
  <path d="M 1330 970 L 1420 970" class="context"/>
  <text x="1440" y="975" class="box-label">context read / evidence</text>
  <path d="M 1330 1010 L 1420 1010" class="artifact-flow"/>
  <text x="1440" y="1015" class="box-label">audit artifact write</text>
  <path d="M 1330 1050 L 1420 1050" class="optional-flow"/>
  <text x="1440" y="1055" class="box-label">optional observability</text>
  <text x="1330" y="1098" class="small">No arrow means no runtime dependency.</text>
  <text x="1330" y="1120" class="small">Causal model output is advisory only.</text>
  <text x="1330" y="1142" class="small">Skill proposal creates review artifacts, not code.</text>

  <!-- Panel B flows -->
  <path d="M 230 784 L 260 784" class="control"/>
  <path d="M 395 784 L 425 784" class="control"/>
  <path d="M 580 784 L 610 784" class="control"/>
  <path d="M 760 784 L 790 784" class="control"/>
  <path d="M 855 803 L 680 1032" class="control"/>
  <path d="M 680 1062 L 680 1100" class="control"/>

  <path d="M 503 803 L 503 860" class="context"/>
  <path d="M 475 803 L 475 970 L 445 970 L 445 985" class="context"/>
  <path d="M 685 765 L 1018 773" class="context"/>
  <path d="M 685 765 L 1178 773" class="context"/>
  <path d="M 680 1100 L 680 1085 L 880 1085 L 880 754 L 950 754" class="context"/>
  <path d="M 1178 773 L 1178 785" class="control"/>
  <path d="M 1178 823 L 1075 860" class="artifact-flow"/>
  <path d="M 1178 735 C 1210 720, 1260 720, 1290 760 L 1290 1116 L 1240 1116" class="optional-flow"/>

  <text x="900" y="1232" text-anchor="middle" class="caption">Figure: DimOS as a modular runtime, with the Go2 agentic extension shown as a blueprint-specific subsystem. Solid arrows are calls/control, dashed arrows are context/evidence reads, dotted arrows are local audit writes, and dash-dot arrows are optional visualization.</text>
</svg>
