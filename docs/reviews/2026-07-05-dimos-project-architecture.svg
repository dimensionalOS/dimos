<svg xmlns="http://www.w3.org/2000/svg" width="1720" height="1120" viewBox="0 0 1720 1120" role="img" aria-labelledby="title desc">
  <title id="title">DimOS Project Architecture</title>
  <desc id="desc">Overall DimOS architecture showing users, CLI/API, blueprint orchestration, core module runtime, typed transports, functional modules, robots, data, and observability.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#23303f"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; fill: #152232; }
      .title { font-size: 42px; font-weight: 800; }
      .subtitle { font-size: 17px; font-weight: 600; fill: #52606d; }
      .section { font-size: 25px; font-weight: 800; }
      .box-label { font-size: 18px; font-weight: 750; }
      .small { font-size: 14px; font-weight: 600; fill: #52606d; }
      .tiny { font-size: 12px; font-weight: 600; fill: #66737f; }
      .frame { fill: #ffffff; stroke: #8a97a6; stroke-width: 2; }
      .blue { fill: #f2f7ff; stroke: #1f5fbf; stroke-width: 2; }
      .green { fill: #f4fbf3; stroke: #2f7d32; stroke-width: 2; }
      .amber { fill: #fff8e7; stroke: #c57a05; stroke-width: 2; }
      .gray { fill: #f6f7f8; stroke: #4a4f55; stroke-width: 2; }
      .purple { fill: #fbf8ff; stroke: #6f3cc3; stroke-width: 2; }
      .red { fill: #fff5f5; stroke: #b42318; stroke-width: 2; }
      .flow { fill: none; stroke: #23303f; stroke-width: 2.2; marker-end: url(#arrow); }
      .soft-flow { fill: none; stroke: #637083; stroke-width: 2; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1720" height="1120" fill="#ffffff"/>
  <text x="860" y="58" text-anchor="middle" class="title">DimOS 项目整体架构</text>
  <text x="860" y="88" text-anchor="middle" class="subtitle">Agentic operating system for robotics: Blueprints compose typed Modules over streams, RPC, and multiple transports.</text>

  <!-- User and entry points -->
  <rect x="60" y="125" width="360" height="150" rx="16" class="blue"/>
  <text x="240" y="160" text-anchor="middle" class="section" fill="#1f5fbf">Entry Points</text>
  <rect x="90" y="185" width="135" height="58" rx="8" class="frame"/>
  <text x="158" y="209" text-anchor="middle" class="box-label">CLI</text>
  <text x="158" y="230" text-anchor="middle" class="small">dimos run/list/mcp</text>
  <rect x="255" y="185" width="135" height="58" rx="8" class="frame"/>
  <text x="323" y="209" text-anchor="middle" class="box-label">Python API</text>
  <text x="323" y="230" text-anchor="middle" class="small">library usage</text>

  <rect x="485" y="125" width="380" height="150" rx="16" class="blue"/>
  <text x="675" y="160" text-anchor="middle" class="section" fill="#1f5fbf">Blueprint Layer</text>
  <rect x="515" y="185" width="150" height="58" rx="8" class="frame"/>
  <text x="590" y="209" text-anchor="middle" class="box-label">Blueprints</text>
  <text x="590" y="230" text-anchor="middle" class="small">autoconnect()</text>
  <rect x="690" y="185" width="145" height="58" rx="8" class="frame"/>
  <text x="763" y="209" text-anchor="middle" class="box-label">Registry</text>
  <text x="763" y="230" text-anchor="middle" class="small">all_blueprints.py</text>

  <rect x="930" y="125" width="330" height="150" rx="16" class="blue"/>
  <text x="1095" y="160" text-anchor="middle" class="section" fill="#1f5fbf">Configuration</text>
  <rect x="960" y="185" width="130" height="58" rx="8" class="frame"/>
  <text x="1025" y="209" text-anchor="middle" class="box-label">GlobalConfig</text>
  <text x="1025" y="230" text-anchor="middle" class="small">env / CLI flags</text>
  <rect x="1110" y="185" width="120" height="58" rx="8" class="frame"/>
  <text x="1170" y="209" text-anchor="middle" class="box-label">.env</text>
  <text x="1170" y="230" text-anchor="middle" class="small">defaults</text>

  <rect x="1325" y="125" width="335" height="150" rx="16" class="purple"/>
  <text x="1492" y="160" text-anchor="middle" class="section" fill="#6f3cc3">External Interfaces</text>
  <rect x="1355" y="185" width="128" height="58" rx="8" class="frame"/>
  <text x="1419" y="209" text-anchor="middle" class="box-label">MCP</text>
  <text x="1419" y="230" text-anchor="middle" class="small">agent tools</text>
  <rect x="1502" y="185" width="128" height="58" rx="8" class="frame"/>
  <text x="1566" y="209" text-anchor="middle" class="box-label">Web / Rerun</text>
  <text x="1566" y="230" text-anchor="middle" class="small">observability</text>

  <!-- Core runtime -->
  <rect x="70" y="330" width="1580" height="235" rx="18" class="gray"/>
  <text x="860" y="368" text-anchor="middle" class="section" fill="#4a4f55">Core Runtime</text>
  <rect x="110" y="405" width="235" height="92" rx="10" class="frame"/>
  <text x="228" y="434" text-anchor="middle" class="box-label">Module</text>
  <text x="228" y="456" text-anchor="middle" class="small">In[T] / Out[T]</text>
  <text x="228" y="477" text-anchor="middle" class="small">typed streams</text>

  <rect x="385" y="405" width="245" height="92" rx="10" class="frame"/>
  <text x="508" y="434" text-anchor="middle" class="box-label">ModuleCoordinator</text>
  <text x="508" y="456" text-anchor="middle" class="small">deploy / lifecycle</text>
  <text x="508" y="477" text-anchor="middle" class="small">system-module wiring</text>

  <rect x="670" y="405" width="235" height="92" rx="10" class="frame"/>
  <text x="788" y="434" text-anchor="middle" class="box-label">Workers</text>
  <text x="788" y="456" text-anchor="middle" class="small">Python / Docker</text>
  <text x="788" y="477" text-anchor="middle" class="small">forkserver actors</text>

  <rect x="945" y="405" width="235" height="92" rx="10" class="frame"/>
  <text x="1063" y="434" text-anchor="middle" class="box-label">RPC / Specs</text>
  <text x="1063" y="456" text-anchor="middle" class="small">typed module refs</text>
  <text x="1063" y="477" text-anchor="middle" class="small">@rpc / @skill</text>

  <rect x="1220" y="405" width="235" height="92" rx="10" class="frame"/>
  <text x="1338" y="434" text-anchor="middle" class="box-label">Messages</text>
  <text x="1338" y="456" text-anchor="middle" class="small">geometry / nav</text>
  <text x="1338" y="477" text-anchor="middle" class="small">sensor / vision</text>

  <rect x="1480" y="405" width="135" height="92" rx="10" class="frame"/>
  <text x="1548" y="434" text-anchor="middle" class="box-label">Run State</text>
  <text x="1548" y="456" text-anchor="middle" class="small">logs</text>
  <text x="1548" y="477" text-anchor="middle" class="small">registry</text>

  <!-- Transports -->
  <rect x="70" y="610" width="1580" height="130" rx="18" class="amber"/>
  <text x="860" y="648" text-anchor="middle" class="section" fill="#c57a05">Communication Layer</text>
  <rect x="125" y="675" width="150" height="44" rx="8" class="frame"/>
  <text x="200" y="703" text-anchor="middle" class="box-label">LCM</text>
  <rect x="325" y="675" width="150" height="44" rx="8" class="frame"/>
  <text x="400" y="703" text-anchor="middle" class="box-label">Zenoh</text>
  <rect x="525" y="675" width="150" height="44" rx="8" class="frame"/>
  <text x="600" y="703" text-anchor="middle" class="box-label">SHM / pSHM</text>
  <rect x="725" y="675" width="150" height="44" rx="8" class="frame"/>
  <text x="800" y="703" text-anchor="middle" class="box-label">ROS</text>
  <rect x="925" y="675" width="150" height="44" rx="8" class="frame"/>
  <text x="1000" y="703" text-anchor="middle" class="box-label">DDS</text>
  <rect x="1125" y="675" width="170" height="44" rx="8" class="frame"/>
  <text x="1210" y="703" text-anchor="middle" class="box-label">Tool Streams</text>
  <rect x="1345" y="675" width="200" height="44" rx="8" class="frame"/>
  <text x="1445" y="703" text-anchor="middle" class="box-label">WebSocket / HTTP</text>

  <!-- Functional modules -->
  <rect x="60" y="790" width="1600" height="178" rx="18" class="green"/>
  <text x="860" y="828" text-anchor="middle" class="section" fill="#2f7d32">Functional Module Families</text>
  <rect x="95" y="858" width="170" height="76" rx="10" class="frame"/>
  <text x="180" y="886" text-anchor="middle" class="box-label">Agents</text>
  <text x="180" y="908" text-anchor="middle" class="small">LangGraph / MCP</text>
  <rect x="295" y="858" width="170" height="76" rx="10" class="frame"/>
  <text x="380" y="886" text-anchor="middle" class="box-label">Skills</text>
  <text x="380" y="908" text-anchor="middle" class="small">@skill containers</text>
  <rect x="495" y="858" width="170" height="76" rx="10" class="frame"/>
  <text x="580" y="886" text-anchor="middle" class="box-label">Perception</text>
  <text x="580" y="908" text-anchor="middle" class="small">detection / memory</text>
  <rect x="695" y="858" width="170" height="76" rx="10" class="frame"/>
  <text x="780" y="886" text-anchor="middle" class="box-label">Mapping</text>
  <text x="780" y="908" text-anchor="middle" class="small">occupancy / TF</text>
  <rect x="895" y="858" width="170" height="76" rx="10" class="frame"/>
  <text x="980" y="886" text-anchor="middle" class="box-label">Navigation</text>
  <text x="980" y="908" text-anchor="middle" class="small">planning / patrol</text>
  <rect x="1095" y="858" width="170" height="76" rx="10" class="frame"/>
  <text x="1180" y="886" text-anchor="middle" class="box-label">Control</text>
  <text x="1180" y="908" text-anchor="middle" class="small">tasks / motion</text>
  <rect x="1295" y="858" width="170" height="76" rx="10" class="frame"/>
  <text x="1380" y="886" text-anchor="middle" class="box-label">Manipulation</text>
  <text x="1380" y="908" text-anchor="middle" class="small">grasp / planning</text>
  <rect x="1495" y="858" width="130" height="76" rx="10" class="frame"/>
  <text x="1560" y="886" text-anchor="middle" class="box-label">Learning</text>
  <text x="1560" y="908" text-anchor="middle" class="small">data prep</text>

  <!-- Hardware and data -->
  <rect x="60" y="1005" width="760" height="82" rx="16" class="red"/>
  <text x="440" y="1038" text-anchor="middle" class="section" fill="#b42318">Robots / Simulation / Hardware</text>
  <text x="440" y="1065" text-anchor="middle" class="box-label">Unitree Go2/G1/B1 · xArm/OpenArm/Piper/A750 · Drones · MuJoCo · Replay data</text>

  <rect x="900" y="995" width="760" height="100" rx="16" class="purple"/>
  <text x="1280" y="1028" text-anchor="middle" class="section" fill="#6f3cc3">Data / Models / Observability</text>
  <text x="1280" y="1055" text-anchor="middle" class="box-label">LFS assets · Memory2 · vector/blob stores</text>
  <text x="1280" y="1078" text-anchor="middle" class="box-label">VLM / embedding / segmentation models · Rerun / Web</text>

  <!-- Flows -->
  <path d="M 420 200 L 485 200" class="flow"/>
  <path d="M 865 200 L 930 200" class="soft-flow"/>
  <path d="M 1260 200 L 1325 200" class="soft-flow"/>
  <path d="M 675 275 L 675 330" class="flow"/>
  <path d="M 860 565 L 860 610" class="flow"/>
  <path d="M 860 740 L 860 790" class="flow"/>
  <path d="M 440 968 L 440 1005" class="flow"/>
  <path d="M 1280 968 L 1280 1005" class="flow"/>
  <path d="M 1492 275 L 1492 610" class="soft-flow"/>
  <path d="M 1419 243 L 1419 858" class="soft-flow"/>

  <text x="1180" y="303" text-anchor="middle" class="tiny">Blueprints choose modules; Core deploys workers; Transports carry streams/RPC.</text>
</svg>
