<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980" role="img" aria-labelledby="title desc">
  <title id="title">DimOS Go2 Agent Self-Evolution Architecture</title>
  <desc id="desc">Layered Go2 agent architecture with agent brain, world state, skill interface, robot body, local review artifacts, and optional Rerun/WebsocketVis observability.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1f2933"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1559b7"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#6f3cc3"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; fill: #14212f; }
      .title { font-size: 42px; font-weight: 800; }
      .layer-label { font-size: 28px; font-weight: 800; }
      .box-label { font-size: 18px; font-weight: 700; }
      .small { font-size: 14px; font-weight: 600; fill: #465462; }
      .tiny { font-size: 12px; font-weight: 600; fill: #52606d; }
      .note { font-size: 14px; font-weight: 600; fill: #5f6b76; }
      .layer3 { fill: #f4f8ff; stroke: #1559b7; stroke-width: 2.4; }
      .layer4 { fill: #f5fbf2; stroke: #2f7d32; stroke-width: 2.2; }
      .layer5 { fill: #fff8e7; stroke: #c57a05; stroke-width: 2.2; }
      .layer6 { fill: #f6f7f8; stroke: #4a4f55; stroke-width: 2.2; }
      .artifact { fill: #fbf8ff; stroke: #6f3cc3; stroke-width: 2.4; }
      .optional { fill: #fbf8ff; stroke: #6f3cc3; stroke-width: 2.4; stroke-dasharray: 10 7; }
      .box-blue { fill: #ffffff; stroke: #1559b7; stroke-width: 2; }
      .box-green { fill: #ffffff; stroke: #2f7d32; stroke-width: 2; }
      .box-amber { fill: #ffffff; stroke: #c57a05; stroke-width: 2; }
      .box-gray { fill: #ffffff; stroke: #4a4f55; stroke-width: 2; }
      .box-purple { fill: #ffffff; stroke: #6f3cc3; stroke-width: 2; }
      .flow { fill: none; stroke: #1f2933; stroke-width: 2.4; marker-end: url(#arrow); }
      .read { fill: none; stroke: #1559b7; stroke-width: 2.2; stroke-dasharray: 7 6; marker-end: url(#arrowBlue); }
      .artifact-flow { fill: none; stroke: #6f3cc3; stroke-width: 2.2; stroke-dasharray: 7 6; marker-end: url(#arrowPurple); }
      .backflow { fill: none; stroke: #344054; stroke-width: 2.1; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1680" height="980" fill="#ffffff"/>
  <text x="840" y="56" text-anchor="middle" class="title">DimOS Go2 Agent 自进化架构</text>

  <!-- Layer frames -->
  <rect x="34" y="90" width="1290" height="250" rx="14" class="layer3"/>
  <text x="650" y="126" text-anchor="middle" class="layer-label" fill="#1559b7">Layer 3 Agent Brain</text>

  <rect x="34" y="382" width="1035" height="150" rx="14" class="layer4"/>
  <text x="535" y="423" text-anchor="middle" class="layer-label" fill="#2f7d32">Layer 4 World State</text>

  <rect x="34" y="565" width="1035" height="143" rx="14" class="layer5"/>
  <text x="535" y="606" text-anchor="middle" class="layer-label" fill="#c57a05">Layer 5 Skill Interface</text>

  <rect x="34" y="750" width="1035" height="145" rx="14" class="layer6"/>
  <text x="535" y="790" text-anchor="middle" class="layer-label" fill="#4a4f55">Layer 6 Robot Body</text>

  <!-- Storage / artifacts, deliberately not observability -->
  <rect x="1370" y="110" width="280" height="292" rx="16" class="artifact"/>
  <text x="1510" y="140" text-anchor="middle" class="layer-label" fill="#6f3cc3">Local Review</text>
  <text x="1510" y="168" text-anchor="middle" class="layer-label" fill="#6f3cc3">Artifacts</text>
  <text x="1510" y="190" text-anchor="middle" class="tiny">local files / optional commit / no auto push</text>
  <rect x="1398" y="205" width="205" height="70" rx="10" class="box-purple"/>
  <text x="1500" y="235" text-anchor="middle" class="box-label">本地 Git Ledger</text>
  <text x="1500" y="258" text-anchor="middle" class="small">.dimos/evolution</text>
  <rect x="1398" y="308" width="205" height="70" rx="10" class="box-purple"/>
  <text x="1500" y="337" text-anchor="middle" class="box-label">JSON Events / Proposals</text>
  <text x="1500" y="360" text-anchor="middle" class="small">review artifacts</text>

  <!-- Optional observability -->
  <rect x="1370" y="464" width="280" height="180" rx="16" class="optional"/>
  <text x="1510" y="498" text-anchor="middle" class="layer-label" fill="#6f3cc3">Optional Observability</text>
  <text x="1510" y="524" text-anchor="middle" class="tiny">not wired by unitree_go2_agentic</text>
  <rect x="1398" y="552" width="205" height="64" rx="10" class="box-purple"/>
  <text x="1500" y="580" text-anchor="middle" class="box-label">可选观测</text>
  <text x="1500" y="604" text-anchor="middle" class="box-label">Rerun / WebsocketVis</text>

  <!-- Layer 3 boxes -->
  <rect x="60" y="225" width="155" height="64" rx="8" class="box-blue"/>
  <text x="138" y="263" text-anchor="middle" class="box-label">用户 Prompt</text>

  <rect x="255" y="225" width="175" height="64" rx="8" class="box-blue"/>
  <text x="343" y="263" text-anchor="middle" class="box-label">Expert Router</text>

  <rect x="470" y="225" width="190" height="64" rx="8" class="box-blue"/>
  <text x="565" y="263" text-anchor="middle" class="box-label">Context Provider</text>

  <rect x="700" y="225" width="190" height="64" rx="8" class="box-blue"/>
  <text x="795" y="263" text-anchor="middle" class="box-label">Task Feasibility</text>

  <rect x="1060" y="225" width="220" height="64" rx="8" class="box-blue"/>
  <text x="1170" y="263" text-anchor="middle" class="box-label">MCP Client / Server</text>

  <rect x="720" y="135" width="150" height="64" rx="8" class="box-blue"/>
  <text x="795" y="162" text-anchor="middle" class="box-label">Skill Outcome</text>
  <text x="795" y="184" text-anchor="middle" class="box-label">Store</text>

  <rect x="900" y="135" width="155" height="64" rx="8" class="box-blue"/>
  <text x="978" y="162" text-anchor="middle" class="box-label">Causal World</text>
  <text x="978" y="184" text-anchor="middle" class="box-label">Model</text>

  <rect x="1085" y="135" width="150" height="64" rx="8" class="box-blue"/>
  <text x="1160" y="173" text-anchor="middle" class="box-label">Skill Proposal</text>

  <rect x="1260" y="135" width="90" height="64" rx="8" class="box-blue"/>
  <text x="1305" y="162" text-anchor="middle" class="box-label">Evolution</text>
  <text x="1305" y="184" text-anchor="middle" class="box-label">Ledger</text>

  <!-- Layer 4 boxes -->
  <rect x="60" y="440" width="220" height="64" rx="8" class="box-green"/>
  <text x="170" y="478" text-anchor="middle" class="box-label">Structured World State</text>

  <rect x="320" y="440" width="230" height="64" rx="8" class="box-green"/>
  <text x="435" y="478" text-anchor="middle" class="box-label">Semantic Temporal Map</text>

  <rect x="590" y="440" width="225" height="64" rx="8" class="box-green"/>
  <text x="703" y="478" text-anchor="middle" class="box-label">RAG / Spatial Memory</text>

  <rect x="845" y="440" width="190" height="64" rx="8" class="box-green"/>
  <text x="940" y="478" text-anchor="middle" class="box-label">Temporal Memory</text>

  <!-- Layer 5 boxes -->
  <rect x="60" y="620" width="270" height="64" rx="8" class="box-amber"/>
  <text x="195" y="658" text-anchor="middle" class="box-label">Skill Contracts</text>

  <rect x="385" y="620" width="230" height="64" rx="8" class="box-amber"/>
  <text x="500" y="658" text-anchor="middle" class="box-label">Preflight Metadata</text>

  <rect x="775" y="620" width="250" height="64" rx="8" class="box-amber"/>
  <text x="900" y="658" text-anchor="middle" class="box-label">Go2 Skills</text>

  <!-- Layer 6 boxes -->
  <rect x="60" y="805" width="245" height="64" rx="8" class="box-gray"/>
  <text x="183" y="843" text-anchor="middle" class="box-label">Go2 Connection</text>

  <rect x="405" y="805" width="260" height="64" rx="8" class="box-gray"/>
  <text x="535" y="843" text-anchor="middle" class="box-label">Sensors / Odom</text>

  <rect x="770" y="805" width="255" height="64" rx="8" class="box-gray"/>
  <text x="898" y="843" text-anchor="middle" class="box-label">Motion Control</text>

  <!-- Main execution flow -->
  <path d="M 215 257 L 255 257" class="flow"/>
  <path d="M 430 257 L 470 257" class="flow"/>
  <path d="M 660 257 L 700 257" class="flow"/>
  <path d="M 890 257 L 1060 257" class="flow"/>
  <path d="M 1170 289 L 1170 652 L 1025 652" class="flow"/>
  <path d="M 900 684 L 900 805" class="flow"/>

  <!-- Robot body flow -->
  <path d="M 305 837 L 405 837" class="flow"/>
  <path d="M 665 837 L 770 837" class="flow"/>

  <!-- Read/evidence flows -->
  <path d="M 535 289 L 535 360 L 170 360 L 170 440" class="read"/>
  <path d="M 555 289 L 555 350 L 435 350 L 435 440" class="read"/>
  <path d="M 585 289 L 585 345 L 703 345 L 703 440" class="read"/>
  <path d="M 615 289 L 615 335 L 940 335 L 940 440" class="read"/>
  <path d="M 575 289 L 575 610 L 195 610 L 195 620" class="read"/>
  <path d="M 600 289 L 600 610 L 500 610 L 500 620" class="read"/>
  <path d="M 795 225 L 795 199" class="read"/>
  <path d="M 978 225 L 978 199" class="read"/>

  <!-- Outcome and self-evolution feedback -->
  <path d="M 900 805 L 900 725 L 795 725 L 795 199" class="backflow"/>
  <text x="730" y="736" text-anchor="middle" class="small">技能执行结果 / Skill Outcome</text>
  <path d="M 870 167 L 900 167" class="flow"/>
  <path d="M 1055 167 L 1085 167" class="flow"/>
  <path d="M 1235 167 L 1260 167" class="flow"/>
  <path d="M 1350 167 L 1370 215" class="artifact-flow"/>
  <path d="M 1305 199 L 1305 337 L 1398 337" class="artifact-flow"/>
  <path d="M 978 135 L 978 112 L 1340 112 L 1340 552 L 1370 552" class="artifact-flow"/>

  <!-- Safety notes -->
  <text x="1120" y="326" text-anchor="middle" class="note">MCP 调用 Go2 skills；不直接改代码</text>
  <text x="1500" y="660" text-anchor="middle" class="note">observability only; no robot control</text>
</svg>
