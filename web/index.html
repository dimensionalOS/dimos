<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DimOS Teleop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                dim: { 50:'#f0f9ff',100:'#e0f2fe',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',900:'#0c4a6e' }
            }}}
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .key-reveal { font-family: 'JetBrains Mono', monospace; word-break: break-all; }
        #canvas { display: none; position: absolute; inset: 0; width: 100%; height: 100%; }
        .kb-key {
            width: 56px; height: 56px;
            display: flex; align-items: center; justify-content: center;
            background: #1f2937; border: 1px solid #374151;
            border-radius: 8px; font-family: monospace; font-weight: 600;
            color: #d1d5db;
            user-select: none;
            /* Tappable on touch: no scroll/zoom hijack, no tap-highlight flash. */
            cursor: pointer;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .kb-key.wide { width: 96px; font-size: 0.85rem; }
        .kb-key.pressed {
            background: #0284c7; border-color: #38bdf8;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <div id="app"></div>
    <canvas id="canvas"></canvas>

    <script type="module" src="js/main.js"></script>
</body>
</html>
